{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Evalify - Create Account</title>

<link rel="icon" type="image/png" href="{% static 'images/Evalify_icon.png' %}">

<link rel="stylesheet" href="{% static 'css/sign_up_style.css' %}">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="signup-container">

<div class="logo-section">

<img src="{% static 'images/evalify_icon.png' %}" class="logo-img">

<span class="logo-text">Evalify</span>

</div>

<div class="signup-card">

<h2>Create Account</h2>

<button class="google-btn">
<img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png">
Sign up with Google
</button>

<div class="divider">OR</div>

<form id="signupForm">

<div class="input-group">
<label>Profile name</label>
<input type="text" id="profileName" placeholder="Enter your profile name" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="Enter your email address" required>
</div>

<div class="input-group">

<div class="label-row">
<label>Password</label>
<span class="toggle-password" id="togglePass">👁 Hide</span>
</div>

<input type="password" id="passwordField" minlength="8" placeholder="Enter your password" required>

<small id="passwordStrength">Use 8 or more characters with a mix of letters, numbers & symbols</small>

</div>

<div class="role-selection">

<span>I am a</span>

<label>
<input type="radio" name="role" value="student" required>
Student
</label>

<label>
<input type="radio" name="role" value="faculty" required>
Faculty
</label>

</div>

<p class="terms">
By creating an account, you agree to the 
<a href="#">Terms of use</a> and 
<a href="#">Privacy Policy</a>.
</p>

<button type="submit" class="submit-btn">Sign up</button>

</form>

<p class="login-link">
Already have an account? 
<a href="{% url 'sign_in_html' %}">Log in</a>
</p>

</div>
</div>

<script src="{% static 'js/sign_up_script.js' %}"></script>

</body>
</html>
